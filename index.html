<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Finder - Grand Show</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="fireworks"></canvas>

    <!-- 배경 노이즈/그레인 오버레이 -->
    <div class="grain-overlay"></div>

    <div id="app">
        <!-- 무대 배경 조명 -->
        <div class="stage-background">
            <div class="spotlight" id="spot1"></div>
            <div class="spotlight" id="spot2"></div>
            <div class="main-beam" id="main-beam"></div>
            <div class="vignette"></div>
        </div>

        <!-- 커튼 -->
        <div id="gate-container" class="gate-container">
            <div class="gate-half left-gate">
                <div class="curtain-fold f1"></div>
                <div class="curtain-fold f2"></div>
                <div class="curtain-fold f3"></div>
            </div>
            <div class="gate-half right-gate">
                <div class="curtain-fold f1"></div>
                <div class="curtain-fold f2"></div>
                <div class="curtain-fold f3"></div>
            </div>
            <div class="entrance-content" id="entrance-content">
                <p class="entrance-eyebrow">GRAND SHOW PRESENTS</p>
                <h1 class="entrance-title">PERSONA<br><em>FINDER</em></h1>
                <p class="entrance-sub">당신의 무대 위 페르소나를 발견하세요</p>
                <button class="btn-entrance" id="entrance-btn" onclick="openGate()">
                    <span class="btn-inner">막을 올리다</span>
                    <span class="btn-line"></span>
                </button>
            </div>
        </div>

        <!-- 메인 콘텐츠 -->
        <main class="content-wrapper">

            <!-- 퀴즈 화면 -->
            <section id="quiz-screen">
                <div id="quiz-area" class="center-content"></div>
            </section>

            <!-- 로딩 화면 -->
            <section id="loading-screen">
                <div class="center-content">
                    <div class="magic-loader">
                        <div class="loader-ring r1"></div>
                        <div class="loader-ring r2"></div>
                        <div class="loader-ring r3"></div>
                        <div class="loader-core">✦</div>
                    </div>
                    <h2 class="loading-text">페르소나 캐스팅 중</h2>
                    <p class="loading-sub">잠시 후 막이 오릅니다</p>
                </div>
            </section>

            <!-- 결과 화면 -->
            <section id="result-screen">
                <div class="result-card center-content">
                    <p class="result-eyebrow">YOUR PERSONA</p>
                    <div id="char-icon-container"></div>
                    <h3 id="result-title"></h3>
                    <p id="result-mbti"></p>
                    <div class="desc-box">
                        <p id="result-desc"></p>
                    </div>
                    <button class="btn-restart" onclick="window.location.reload()">
                        다시 처음부터
                    </button>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
